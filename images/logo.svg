<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
  </defs>
  <!-- 배경 (정사각형, 둥근 모서리) -->
  <rect width="256" height="256" rx="32" ry="32" fill="#1e1e1e"/>
  <!-- 펄스 라인 -->
  <polyline points="32 128 64 128 84 64 116 192 140 88 160 128 224 128"
    fill="none" stroke="url(#pulse-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 에이전트 노드 -->
  <circle cx="84" cy="64" r="10" fill="#2196f3"/>
  <circle cx="116" cy="192" r="10" fill="#ff9800"/>
  <circle cx="140" cy="88" r="10" fill="#4caf50"/>
  <!-- 연결선 -->
  <line x1="84" y1="64" x2="116" y2="192" stroke="#2196f3" stroke-width="2" opacity="0.3"/>
  <line x1="116" y1="192" x2="140" y2="88" stroke="#ff9800" stroke-width="2" opacity="0.3"/>
</svg>
